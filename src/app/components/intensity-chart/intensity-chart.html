@if (graphSeries$ | async) {
  @if (loading$ | async; as loading) {
  <div class="chart-loading" aria-live="polite">Loading chart…</div>
}

   <span class="chart-title">48-hour overview</span>
<app-line-chart [options]="options"
  class="demo-chart" [class.is-loading]="(loading$|async) === true"></app-line-chart>
}
}
